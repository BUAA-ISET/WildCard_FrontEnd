name: frontend-test

on:
  push:
    branches: [main, test/work]
  pull_request:
    branches: [main, test/work]

jobs:
  test:
    runs-on: ubuntu-24.04
    env:
      CYPRESS_INSTALL_BINARY: 0
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Cache Cypress binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            if npm ci --ignore-scripts; then
              break
            fi

            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi

            rm -rf node_modules
            echo "npm ci failed on attempt $attempt, retrying..."
            sleep 5
          done

      - name: Restore build scripts
        run: npm rebuild esbuild vue-demi

      - name: Run unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build

      - name: Install Cypress binary
        run: |
          for attempt in 1 2 3; do
            if npx cypress install; then
              break
            fi

            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi

            echo "cypress install failed on attempt $attempt, retrying..."
            sleep 5
          done

      - name: Install Cypress system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-0t64 \
            libgbm-dev \
            libnotify-dev \
            libnss3 \
            libxss1 \
            libasound2t64 \
            libxtst6 \
            xauth \
            xvfb

      - name: Enable Cypress sandbox
        run: |
          mapfile -t sandbox_paths < <(find "$HOME/.cache/Cypress" -path '*/Cypress/chrome-sandbox')
          if [ "${#sandbox_paths[@]}" -eq 0 ]; then
            echo "No chrome-sandbox found; continuing without sandbox patch."
            exit 0
          fi

          for sandbox in "${sandbox_paths[@]}"; do
            sudo chown root:root "$sandbox"
            sudo chmod 4755 "$sandbox"
          done

      - name: Run E2E tests
        run: npm run test:e2e
