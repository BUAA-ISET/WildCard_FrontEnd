name: frontend-test

on:
  push:
    branches: [main, test/work]
  pull_request:
    branches: [main, test/work]

jobs:
  test:
    runs-on: ubuntu-24.04
    container:
      image: cypress/browsers:22.15.0
      options: --user 1001
    env:
      CYPRESS_INSTALL_BINARY: 0
      CYPRESS_CACHE_FOLDER: ${{ github.workspace }}/.cache/Cypress
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Cache Cypress binary
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            if npm ci --ignore-scripts; then
              break
            fi

            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi

            rm -rf node_modules
            echo "npm ci failed on attempt $attempt, retrying..."
            sleep 5
          done

      - name: Restore build scripts
        run: npm rebuild esbuild vue-demi

      - name: Run unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build

      - name: Install Cypress binary
        run: |
          mkdir -p "$CYPRESS_CACHE_FOLDER"
          for attempt in 1 2 3; do
            if npx cypress install; then
              break
            fi

            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi

            echo "cypress install failed on attempt $attempt, retrying..."
            sleep 5
          done

      - name: Run E2E tests
        run: |
          Xvfb :99 -screen 0 1280x1024x24 >/tmp/xvfb.log 2>&1 &
          export DISPLAY=:99
          sleep 2
          npm run test:e2e
